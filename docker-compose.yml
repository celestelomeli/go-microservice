services:
  postgres:
    image: postgres:15
    ports:
      # Host port 5435 to avoid colliding with other local Postgres containers
      - "5435:5432"
    environment:
      POSTGRES_DB: microservice_db
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Runs once on first init
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d microservice_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  userservice:
    build: ./userservice
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: user_svc
      DB_PASSWORD: user_secret
      DB_NAME: users_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  orderservice:
    build: ./orderservice
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      productservice:
        condition: service_healthy
      userservice:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: order_svc
      DB_PASSWORD: order_secret
      DB_NAME: orders_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  productservice:
    build: ./productservice
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: product_svc
      DB_PASSWORD: product_secret
      DB_NAME: products_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    depends_on:
      userservice:
        condition: service_healthy
      orderservice:
        condition: service_healthy
      productservice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontendservice:
    build: ./frontendservice
    ports:
      # Host port 3001 to avoid colliding with local containers on 3000
      - "3001:3000"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
